name: Build aria2

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: true
      - name: Setup NDK
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake autopoint autotools-dev libtool libxml2-dev libcppunit-dev binutils bzip2 make binutils pkg-config dpkg-dev curl ca-certificates
          wget https://dl.google.com/android/repository/android-ndk-r23b-linux.zip
          unzip -q android-ndk-r23b-linux.zip
          export ANDROID_NDK_HOME=`pwd`/android-ndk-r23b
          export PATH=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
          export SILENT=true
      - name: Build
        run: |
          ./build_all.sh
          file ./bin/armeabi-v7a/bin/aria2c
          file ./bin/arm64-v8a/bin/aria2c
          file ./bin/x86/bin/aria2c
          file ./bin/x86_64/bin/aria2c
      - name: Rename binaries
        run: |
          mkdir -p release
          cp ./bin/armeabi-v7a/bin/aria2c ./release/aria2c-armeabi-v7a
          cp ./bin/arm64-v8a/bin/aria2c ./release/aria2c-arm64-v8a
          cp ./bin/x86/bin/aria2c ./release/aria2c-x86
          cp ./bin/x86_64/bin/aria2c ./release/aria2c-x86_64
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./release/aria2c-armeabi-v7a
            ./release/aria2c-arm64-v8a
            ./release/aria2c-x86
            ./release/aria2c-x86_64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
